name: Feature request
description: Suggest a product or UX improvement for RCOD
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is hard, missing, or annoying today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, UX, or API.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Include example Telegram flows, repo structures, or screenshots if helpful.
