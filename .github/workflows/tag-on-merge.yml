name: Auto Tag on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && (startsWith(github.event.pull_request.title, 'feat:') || startsWith(github.event.pull_request.title, 'fix:'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ github.token }}

      - name: Calculate and Push Tag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE="$PR_TITLE"
          echo "PR Title: $TITLE"

          # Get latest tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse version components (removing 'v' prefix)
          VERSION_RAW="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION_RAW" | cut -d. -f1)
          MINOR=$(echo "$VERSION_RAW" | cut -d. -f2)
          PATCH=$(echo "$VERSION_RAW" | cut -d. -f3)

          if [[ "$TITLE" == feat:* ]]; then
            echo "Detected feature - minor bump"
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [[ "$TITLE" == fix:* ]]; then
            echo "Detected fix - patch bump"
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "New tag: $NEW_TAG"

          # Setup git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and push tag
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
