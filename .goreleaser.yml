# This is a GoReleaser configuration file.
# See https://goreleaser.com for more information.

version: 2

project_name: remote-control-on-demand

before:
  hooks:
    - npm ci --prefix app
    - npm test --prefix app
    - npm run build --prefix app

builds:
  - id: rcod
    main: ./cmd/rcodbot
    binary: rcod
    tags:
      - release
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
  - id: ralph
    main: ./cmd/ralph
    binary: ralph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
      - SECURITY.md
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

nfpms:
  - id: rcod-deb
    package_name: rcod
    ids:
      - rcod
    formats:
      - deb
    bindir: /usr/bin
    vendor: zevro.ai
    homepage: https://github.com/zevro-ai/remote-control-on-demand
    maintainer: zevro.ai <maintainer@zevro.ai>
    description: |-
      Remote Control On Demand (RCOD) lets you control Codex and Claude Code
      sessions remotely from Telegram.
    license: Apache 2.0
    section: utils
    priority: optional
    file_name_template: "{{ .ConventionalFileName }}"
    contents:
      - src: ./scripts/install-rcod-systemd.sh
        dst: /usr/lib/rcod/install-rcod-systemd.sh
        file_info:
          mode: 0755
      - src: ./packaging/systemd/rcod.service
        dst: /usr/share/rcod/systemd/rcod.service
        file_info:
          mode: 0644
      - src: ./packaging/systemd/rcod.user.service
        dst: /usr/share/rcod/systemd/rcod.user.service
        file_info:
          mode: 0644
      - src: ./config.example.yaml
        dst: /usr/share/doc/rcod/examples/config.example.yaml
        file_info:
          mode: 0644
      - src: ./docs/deployment/systemd.md
        dst: /usr/share/doc/rcod/systemd.md
        file_info:
          mode: 0644
      - src: ./docs/deployment/deb.md
        dst: /usr/share/doc/rcod/deb-package.md
        file_info:
          mode: 0644
      - src: ./README.md
        dst: /usr/share/doc/rcod/README.md
        file_info:
          mode: 0644
      - src: ./SECURITY.md
        dst: /usr/share/doc/rcod/SECURITY.md
        file_info:
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/rcod/copyright
        file_info:
          mode: 0644
      - dst: /etc/rcod
        type: dir
        file_info:
          mode: 0755
      - dst: /var/lib/rcod
        type: dir
        file_info:
          mode: 0700
    deb:
      fields:
        Bugs: https://github.com/zevro-ai/remote-control-on-demand/issues

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: '🚀 Features'
      regexp: '^feat(\(.*\))??!?:'
      order: 0
    - title: '🐛 Bug Fixes'
      regexp: '^fix(\(.*\))??!?:'
      order: 1
    - title: '⚙️ Maintenance'
      regexp: '^(chore|ci|build)(\(.*\))??!?:'
      order: 2
    - title: '📚 Documentation'
      regexp: '^docs(\(.*\))??!?:'
      order: 3
    - title: '♻️ Refactor'
      regexp: '^refactor(\(.*\))??!?:'
      order: 4
    - title: '🧪 Testing'
      regexp: '^test(\(.*\))??!?:'
      order: 5
    - title: '💎 Style'
      regexp: '^style(\(.*\))??!?:'
      order: 6
    - title: '⚡ Performance'
      regexp: '^perf(\(.*\))??!?:'
      order: 7
    - title: '🧹 Others'
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(deps\):'
      - '^chore\(release\):'
      - 'merge branch'
      - 'Merge pull request'
  # Note: template and replacements moved out of changelog in v2 or changed structure.
  # For now, let's go back to basic groups which GoReleaser v2 handles well by default.
